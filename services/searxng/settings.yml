use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY:-default_secret_key}"
  limiter: false

redis:
  url: "${SEARXNG_REDIS_URL:-redis://redis:6379/0}"

search:
  formats:
    - json
  safe_search: 0
  default_lang: en
  # Never suspend engines — retry immediately (useful with rotating proxies)
  suspended_times:
    SearxEngineAccessDenied: 0
    SearxEngineCaptcha: 0
    SearxEngineTooManyRequests: 0
    cf_SearxEngineCaptcha: 0
    cf_SearxEngineAccessDenied: 0
    recaptcha_SearxEngineCaptcha: 0
  ban_time_on_fail: 0
  max_ban_time_on_fail: 0

outgoing:
  request_timeout: 15.0
  max_request_timeout: 20.0
  enable_http2: false
  # Google /sorry/-blocks a fraction of the rotating residential exit IPs.
  # google_sorry_fix.py turns a 302/sorry into an immediate-retry captcha
  # (suspended_times: 0 below), so each retry rotates to a fresh IP. With the
  # US-geo pool ~2/3 of IPs are clean, so 4 attempts (retries: 3) ≈ 99% hit a
  # working IP. Do NOT set source_ips here — binding the local socket while
  # proxying is pointless (the exit IP is the proxy's) and degrades requests.
  retries: 3
  pool_connections: 20
  pool_maxsize: 20
  verify: false
  proxies:
    all://:
      # PROXY_URL MUST geo-target US — the EU residential pool is broadly
      # /sorry/-blocked by Google, US is mostly clean. Evomi format appends
      # params to the PASSWORD, e.g.
      #   http://user:PASS_country-US@core-residential.evomi.com:1000
      # Keep it ROTATING (no _session-…): a sticky IP that lands on a burned
      # one stays burned for the whole session.
      - ${PROXY_URL}

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    disabled: false

  - name: brave
    engine: brave
    shortcut: b
    use_mobile_ui: false
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    use_mobile_ui: false
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    use_mobile_ui: false
    disabled: false
