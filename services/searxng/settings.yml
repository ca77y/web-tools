use_default_settings:
  engines:
    keep_only:
      - google cse
      - brave
      - duckduckgo
      - bing
      - qwant
      - mojeek
      - wikipedia

server:
  secret_key: "${SEARXNG_SECRET_KEY:-default_secret_key}"
  limiter: false

redis:
  url: "${SEARXNG_REDIS_URL:-redis://redis:6379/0}"

search:
  formats:
    - json
  safe_search: 0
  default_lang: en
  suspended_times:
    # Class-keyed DEFAULT suspend durations (seconds). SearXNG applies these
    # per-engine-network (see searx/search/processors/abstract.py:
    # SUSPENDED_STATUS is keyed by the engine's network, not by exception
    # class), and only when an engine raises the class WITHOUT an explicit
    # suspended_time. Suspension is checked at search dispatch and skips the
    # engine on SUBSEQUENT searches; it never interrupts the in-search
    # outgoing.retries rotation, which lives at the network layer.
    #
    # Ordering reflects how exit-IP-rotation-recoverable each class is:
    # a fresh rotating exit IP fixes a CAPTCHA, may not fix a rate-limit, and
    # usually will not fix a per-ASN/fingerprint 403 — so re-test soonest for
    # CAPTCHA, latest for AccessDenied.

    # CAPTCHA is the most rotation-recoverable class: a clean exit IP clears a
    # challenge page, so this class is re-tested soonest. DuckDuckGo, Qwant and
    # Mojeek all reach it through our egress.
    #
    # 60s is a circuit breaker, not a brake on rotation. The engines that
    # actually recover by rotating raise this class with an EXPLICIT
    # `suspended_time=0` (duckduckgo.py does so twice), and an explicit value
    # always wins over this config default — so the engines that benefit most
    # from an immediate retry are unaffected by the number here. This value
    # applies only to a BARE raise, where it bounds the tail: after four failed
    # attempts, any search dispatched in the next 60s skips re-gambling on that
    # engine instead of repeating the same losing rotation. Upstream's default
    # is 86400 (24h), which would drop the engine for a whole day.
    #
    # Suspension never interrupts the in-search rotation: outgoing.retries: 3
    # rotates exit IPs entirely WITHIN one search's outgoing HTTP request/retry
    # loop (searx/network/network.py: Network.call_client), which runs and
    # exhausts its 4 attempts BEFORE engine.response() ever raises this
    # exception — suspension is consulted only at the NEXT search's dispatch.
    SearxEngineCaptcha: 60
    # 429 / "too many requests" (brave, wikipedia) is largely volume-driven and
    # decays with time; 2 min lets the rate window drain and re-tests quickly
    # because these are core engines. Upstream default is 3600 (1h).
    SearxEngineTooManyRequests: 120
    # 403 / access-denied (mojeek, qwant on first contact) points at per-ASN /
    # fingerprint reputation that a fresh exit IP will NOT fix; suspend longest
    # so we stop hammering, but only 5 min (not upstream's 86400 = 24h) because
    # the standing of whatever egress we run on can change and is worth
    # re-testing. Measured 2026-07-23: mojeek and qwant both answer 6/6 from a
    # clean residential IP and fail every time from the unproxied production
    # egress, so this class is an egress verdict, not an engine verdict.
    SearxEngineAccessDenied: 300
    # Cloudflare / reCAPTCHA challenges are per-fingerprint/session, not exit-IP
    # rotation-recoverable, so treat them like durable access-denied. None of the
    # seven allowlisted engines raise these today; bounding them prevents ever
    # inheriting upstream's 15-day / 7-day / 1-day defaults if one starts to.
    cf_SearxEngineCaptcha: 300
    cf_SearxEngineAccessDenied: 300
    recaptcha_SearxEngineCaptcha: 300
  # Generic per-fail ban for failures with no class-specific suspended_time
  # (timeouts, connection resets, non-access-denied errors). SearXNG grows
  # this ban with consecutive failures — min(ban_time_on_fail * n_errors,
  # max_ban_time_on_fail) — so 5s is only the FIRST-failure cooldown (a
  # minimal pause before re-querying a timing-out engine, e.g. duckduckgo:
  # 117 timeouts in the sample, on the immediately following search), and
  # 120s is the real ceiling a repeatedly-failing engine grows into. The
  # timeout storm itself is owned by search-client-fanout-and-timeout-budget.
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

outgoing:
  request_timeout: 15.0
  max_request_timeout: 20.0
  enable_http2: false
  # Providers block a fraction of any shared exit-IP pool. Each retry within a
  # search rotates to a fresh IP via the proxy below, so a blocked first
  # attempt usually recovers inside the same search. With a US-geo residential
  # pool ~2/3 of IPs are clean, so 4 attempts (retries: 3) ≈ 99% hit a working
  # one. Do NOT set source_ips here — binding the local socket while proxying
  # is pointless (the exit IP is the proxy's) and degrades requests.
  #
  # NOTE: PROXY_URL is UNSET in production today — the SearXNG service logs
  # "Proxy: disabled" at boot, so this entire proxy block is stripped by the
  # entrypoint and every request egresses from the Railway datacenter IP
  # directly. That is the dominant cause of engine blocking, and none of the
  # rotation reasoning above applies until a proxy is configured. See
  # ../../docs/tasks/searxng-configure-egress-proxy.md.
  retries: 3
  pool_connections: 20
  # Keep-alive ON (pool_maxsize>0). Tested pool_maxsize:0 to force per-retry IP
  # rotation past burned IPs, but establishing a fresh residential tunnel per
  # request is slow enough to blow the 15s timeout under concurrent load —
  # reliability dropped (3/12 vs 7/10). Reused warm tunnels are faster; we lean
  # on US-geo (~2/3 clean on first connect) instead of per-retry rotation.
  pool_maxsize: 20
  verify: false
  proxies:
    all://:
      # PROXY_URL MUST geo-target US — the EU residential pool is broadly
      # /sorry/-blocked by Google, US is mostly clean. Evomi format appends
      # params to the PASSWORD, e.g.
      #   http://user:PASS_country-US@core-residential.evomi.com:1000
      # Keep it ROTATING (no _session-…): a sticky IP that lands on a burned
      # one stays burned for the whole session.
      - ${PROXY_URL}

engines:
  # Replaces the plain `google` engine, which was removed on 2026-07-23.
  # Upstream ships `google` as `inactive: true` because its HTML endpoint is
  # now JS-gated: every request returns HTTP 200 carrying Google's "enablejs"
  # interstitial instead of results. Measured against the built image with the
  # engine's own request, plus the udm=14, gbv=1, num=20 and minimal-parameter
  # variants — all five return the interstitial. The XPath selectors match
  # nothing and nothing raises, so the engine reported a SUCCESSFUL search with
  # zero results on every query. That is the exact failure mode
  # packages/CLAUDE.md forbids, and no egress change fixes it.
  #
  # `google cse` queries the same index through Google's Programmable Search
  # endpoint and returns ~20 results per query. Caveat: upstream hard-codes a
  # THIRD-PARTY search-engine id (CX `partner-pub-8993703457585266`, belonging
  # to blackle.com) in searx/engines/google_cse.py. The quota is not ours and
  # can be revoked without notice, so treat this engine as best-effort.
  - name: google cse
    engine: google_cse
    shortcut: goc
    disabled: false

  - name: brave
    engine: brave
    shortcut: b
    use_mobile_ui: false
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    use_mobile_ui: false
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    use_mobile_ui: false
    disabled: false
