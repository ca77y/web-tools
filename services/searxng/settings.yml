use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY:-default_secret_key}"
  limiter: false

redis:
  url: "${SEARXNG_REDIS_URL:-redis://redis:6379/0}"

search:
  formats:
    - json
  safe_search: 0
  default_lang: en
  # Never suspend engines — retry immediately (useful with rotating proxies)
  suspended_times:
    SearxEngineAccessDenied: 0
    SearxEngineCaptcha: 0
    SearxEngineTooManyRequests: 0
    cf_SearxEngineCaptcha: 0
    cf_SearxEngineAccessDenied: 0
    recaptcha_SearxEngineCaptcha: 0
  ban_time_on_fail: 0
  max_ban_time_on_fail: 0

outgoing:
  request_timeout: 15.0
  max_request_timeout: 20.0
  enable_http2: false
  # Retry once on engine HTTP errors. On retry SearXNG picks a
  # different proxy from the round-robin pool below. We keep retries
  # low (1) on purpose — high retries × bursty workloads burn the
  # whole pool in seconds because Google CAPTCHAs each new IP on
  # first contact. Giving up faster preserves pool freshness.
  retries: 1
  pool_connections: 20
  pool_maxsize: 20
  source_ips:
    - 0.0.0.0
  verify: false
  # entrypoint.py substitutes ${PROXY_URL} at container startup with
  # the full Webshare residential pool (one `- http://...` per IP)
  # fetched from /api/v2/proxy/list. If the API call fails we fall
  # back to a single proxy or no proxy at all.
  proxies:
    all://:
      - ${PROXY_URL}

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
    disabled: false

  - name: brave
    engine: brave
    shortcut: b
    use_mobile_ui: false
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    use_mobile_ui: false
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    use_mobile_ui: false
    disabled: false
