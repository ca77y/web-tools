name: Claude Code Review

on:
  # Auto-run only when a PR is first opened (not on every push/synchronize).
  pull_request:
    types: [opened]
  # On-demand: trigger by commenting "@review" on a PR.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    # Run automatically on PR open, or on demand when "@review" is mentioned in a
    # PR comment. The "@claude" handle stays bound to the general assistant.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@review'))

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Let the reviewer read PR check results (build/lint/test CI)
          additional_permissions: |
            actions: read
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Force tag mode so the GitHub commenting context + tools are available
          # to the plugin's review agents (otherwise posting tools are denied).
          track_progress: true
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }}'
          # Run the review on Opus 4.8 with xhigh reasoning effort.
          claude_args: '--model claude-opus-4-8 --effort xhigh'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

