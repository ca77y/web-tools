services:
  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"

  searxng:
    restart: unless-stopped
    build: ./services/searxng
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET_KEY=dev-secret-key
      - SEARXNG_REDIS_URL=redis://redis:6379/0
      - PROXY_URL=${PROXY_URL:-}
    depends_on:
      - redis

  crawl4ai:
    restart: unless-stopped
    build: ./services/crawl4ai
    ports:
      - "11235:11235"
    environment:
      # Crawl4AI binds 127.0.0.1 inside its own container when this is empty,
      # which makes it unreachable from web_tools. The value is not a secret —
      # it exists only to keep the listener on 0.0.0.0. Both services default
      # to the same literal so the local stack needs no configuration.
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-local-dev-token}

  web_tools:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - PORT=3000
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-local-dev-token}
      # API_KEY is deliberately unset: the local stack runs unauthenticated.
    depends_on:
      - searxng
      - crawl4ai
