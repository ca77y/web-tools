services:
  redis:
    restart: unless-stopped
    image: redis:7-alpine

  searxng:
    restart: unless-stopped
    build: ./services/searxng
    environment:
      - SEARXNG_SECRET_KEY=dev-secret-key
      - SEARXNG_REDIS_URL=redis://redis:6379/0
      - PROXY_URL=${PROXY_URL:-}
    depends_on:
      - redis

  crawl4ai:
    restart: unless-stopped
    build: ./services/crawl4ai
    environment:
      # Crawl4AI binds 127.0.0.1 inside its own container when this is empty,
      # which makes it unreachable from web_tools. The value is not a secret —
      # it exists only to keep the listener on 0.0.0.0. Both services default
      # to the same literal so the local stack needs no configuration.
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-local-dev-token}

  web_tools:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Only web_tools is reachable from the host, on a deliberately
      # non-default high port so common dev ports (3000, 8080, ...) stay
      # free. Export WEB_TOOLS_PORT to override the host port. SearXNG,
      # Crawl4AI, and Redis have no host mapping at all; web_tools reaches
      # them over the compose network by service name.
      - "${WEB_TOOLS_PORT:-60521}:3000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - PORT=3000
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-local-dev-token}
      # API_KEY is deliberately unset: the local stack runs unauthenticated.
    depends_on:
      - searxng
      - crawl4ai
